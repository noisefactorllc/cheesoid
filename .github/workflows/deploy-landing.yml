name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'cheesoid.svg'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy content
        run: |
          ssh deploy@${{ secrets.SCAFFOLD_SERVER_IP }} 'mkdir -p /home/deploy/sites/cheesoid.noisefactor.io/content'
          rsync -avz --delete \
            index.html cheesoid.svg \
            deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:/home/deploy/sites/cheesoid.noisefactor.io/content/
