name: Build and Push Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Login to self-hosted registry
        run: echo "${{ secrets.REGISTRY_PASS }}" | docker login registry.noisefactor.io -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Set deploy timestamp
        id: meta
        run: echo "deploy_date=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          build-args: |
            GIT_HASH=${{ github.sha }}
            DEPLOY_DATE=${{ steps.meta.outputs.deploy_date }}
          tags: |
            registry.noisefactor.io/cheesoid:latest
            registry.noisefactor.io/cheesoid:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: 2959521
          private-key: ${{ secrets.EHSRE_APP_PRIVATE_KEY }}
          owner: noisefactorllc

      - name: Trigger deploy in scaffold
        run: |
          curl -sf -X POST https://api.github.com/repos/noisefactorllc/scaffold/dispatches \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type":"cheesoid-image-pushed","client_payload":{"sha":"${{ github.sha }}"}}'
