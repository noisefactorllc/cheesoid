name: Build and Push Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to self-hosted registry
        run: echo "${{ secrets.REGISTRY_PASS }}" | docker login registry.noisefactor.io -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            registry.noisefactor.io/cheesoid:latest
            registry.noisefactor.io/cheesoid:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 2959521
          private-key: ${{ secrets.EHSRE_APP_PRIVATE_KEY }}
          owner: noisefactorllc

      - name: Trigger deploy in scaffold
        run: |
          curl -sf -X POST https://api.github.com/repos/noisefactorllc/scaffold/dispatches \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type":"cheesoid-image-pushed","client_payload":{"sha":"${{ github.sha }}"}}'
