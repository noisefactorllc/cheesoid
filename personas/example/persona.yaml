name: example
display_name: "Example Agent"

## Provider registry — define named providers for use in model strings
providers:
  my-provider:
    type: openai-compat
    base_url: https://api.example.com/v1
    api_key: ${MY_PROVIDER_API_KEY}
  openai:
    type: openai-responses
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    reasoning_effort: high

model: some-fast-model:my-provider

orchestrator: gpt-5.4:openai

## Modal mode: attention/cognition gear shifting (replaces orchestrator)
## The agent starts in attention mode (cheap) and shifts to cognition (frontier)
## when directly engaged. Both modes share the same tools and prompt.
# cognition: claude-sonnet-4-6              # frontier model, full engagement
# attention: claude-haiku-4-5               # capable model, monitoring
# cognition_fallback_models:
#   - claude-sonnet-4-6

fallback_models:
  - some-other-model:my-provider
  - gpt-5.4-mini:openai
  - claude-haiku-4-5
max_budget_usd: 6

theme: synthwave
data_theme: synthwave

tools: tools/tools.js

server_tools:
  - type: web_search_20250305
    name: web_search

chat:
  prompt: prompts/system.md
  thinking_budget: 16000
  max_turns: 20
  idle_timeout_minutes: 30

## Legacy style also works (no providers block needed):
# provider: openai-compat
# base_url: https://api.example.com/v1
# api_key: ${MY_PROVIDER_API_KEY}
# model: some-fast-model
#
# orchestrator:
#   provider: anthropic
#   model: claude-sonnet-4-6

## Uncomment if running behind an auth proxy (e.g. groundsquirrel):
# auth_proxy: true

## Uncomment to accept connections from other agents:
# agents:
#   - name: other-agent
#     secret: ${AGENT_SECRET_OTHER}

## Uncomment to join another cheesoid room:
# rooms:
#   - url: http://other-cheesoid:3000
#     name: other-room
#     domain: other-room.example.com
#     secret: ${ROOM_SECRET_OTHER}

memory:
  dir: memory/
  auto_read:
    - MEMORY.md
