name: example
display_name: "Example Agent"
model: claude-sonnet-4-6
max_budget_usd: 6

tools: tools/tools.js

chat:
  prompt: prompts/system.md
  thinking_budget: 16000
  max_turns: 20
  idle_timeout_minutes: 30

## Uncomment to accept connections from other agents:
# agents:
#   - name: other-agent
#     secret: ${AGENT_SECRET_OTHER}

## Uncomment to join another cheesoid room:
# rooms:
#   - url: http://other-cheesoid:3000
#     name: other-room
#     secret: ${ROOM_SECRET_OTHER}

memory:
  dir: memory/
  auto_read:
    - MEMORY.md
