name: example
display_name: "Example Agent"
model: claude-sonnet-4-6
max_budget_usd: 6

theme: gray
data_theme: gray-dark

tools: tools/tools.js

server_tools:
  - type: web_search_20250305
    name: web_search

chat:
  prompt: prompts/system.md
  thinking_budget: 16000
  max_turns: 20
  idle_timeout_minutes: 30

## Uncomment to use an OpenAI-compatible provider instead of Anthropic:
# provider: openai-compat
# base_url: ${OPENAI_COMPAT_BASE_URL}
# api_key: ${OPENAI_COMPAT_API_KEY}
# model: your-model-name
## Note: server_tools (web_search) are Anthropic-only and will be skipped.
## Set OPENAI_COMPAT_BASE_URL and OPENAI_COMPAT_API_KEY in your environment.

## Uncomment if running behind an auth proxy (e.g. groundsquirrel):
# auth_proxy: true

## Uncomment to accept connections from other agents:
# agents:
#   - name: other-agent
#     secret: ${AGENT_SECRET_OTHER}

## Uncomment to join another cheesoid room:
# rooms:
#   - url: http://other-cheesoid:3000
#     name: other-room
#     secret: ${ROOM_SECRET_OTHER}

memory:
  dir: memory/
  auto_read:
    - MEMORY.md
