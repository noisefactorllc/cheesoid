name: example
display_name: "Example Agent"

## Provider registry — define named providers for use in model strings
providers:
  openai:
    type: openai-compat
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    max_completion_tokens: true

## Model strings use "model:provider" syntax. Claude models auto-detect.
model: gpt-5.4-mini:openai

## Orchestrator (gpt-5.4 — latest)
orchestrator: gpt-5.4:openai

fallback_models:
  - gpt-5.4-nano:openai
  - claude-haiku-4-5
max_budget_usd: 6

theme: gray
data_theme: gray-dark

tools: tools/tools.js

server_tools:
  - type: web_search_20250305
    name: web_search

chat:
  prompt: prompts/system.md
  thinking_budget: 16000
  max_turns: 20
  idle_timeout_minutes: 30

## Legacy style also works (no providers block needed):
# provider: openai-compat
# base_url: ${OPENAI_COMPAT_BASE_URL}
# api_key: ${OPENAI_COMPAT_API_KEY}
# model: AltFast/Maverick-17B-128E-Instruct
#
# orchestrator:
#   provider: anthropic
#   model: claude-sonnet-4-6

## Uncomment if running behind an auth proxy (e.g. groundsquirrel):
# auth_proxy: true

## Uncomment to accept connections from other agents:
# agents:
#   - name: other-agent
#     secret: ${AGENT_SECRET_OTHER}

## Uncomment to join another cheesoid room:
# rooms:
#   - url: http://other-cheesoid:3000
#     name: other-room
#     secret: ${ROOM_SECRET_OTHER}

memory:
  dir: memory/
  auto_read:
    - MEMORY.md
